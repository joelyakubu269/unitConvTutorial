<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Converter</title>

</head>
<body>
    <form action="/temperature">
           <label for="temperature">Enter the value you wish to convert</label>
        <input type="text" id="temperature" name="value">
        <select name="From" >
            <option value="" select disabled> choose the unit you wish to convert from</option>
            <option value="celsius">celsius</option>
            <option value="kelvin">kelvin</option>
            <option value="fahrenheit">fahrenheit</option>

        </select>
         <select name="To" >
            <option value="" select disabled> choose the unit you wish to convert to</option>
            <option value="celsius">celsius</option>
            <option value="kelvin">kelvin</option>
            <option value="fahrenheit">fahrenheit</option>

        </select>
        <button type="submit">Convert</button>
       
    </form>
     <pre>{{.Result}}</pre>
</body>
</html>
